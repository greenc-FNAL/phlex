# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "CodeQL - Analyze (C++, Python, Actions)"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 3 * * 0'  # weekly (UTC) — adjust as needed
  workflow_dispatch:
  workflow_call:
    inputs:
      checkout-path:
        description: "Path to check out code to"
        required: false
        type: string
      build-path:
        description: "Path for build artifacts"
        required: false
        type: string
      language-matrix:
        description: "JSON array of languages to analyze"
        required: false
        type: string
        default: '["cpp", "python", "actions"]'
      pr-number:
        description: "PR number if run in PR context"
        required: false
        type: string
      pr-head-repo:
        description: "The full name of the PR head repository"
        required: false
        type: string
      pr-base-repo:
        description: "The full name of the PR base repository"
        required: false
        type: string

permissions:
  actions: read
  contents: read
  security-events: write

env:
  BUILD_TYPE: RelWithDebInfo
  CPP_COMPILER: g++

jobs:
  codeql:
    name: Analyze ${{ matrix.language }} with CodeQL
    runs-on: ubuntu-24.04
    container:
      image: ghcr.io/framework-r-d/phlex-ci:latest
    env:
      local_checkout_path: ${{ (github.event_name == 'workflow_call' && inputs.checkout-path) || format('{0}-src', github.event.repository.name) }}
      local_build_path: ${{ (github.event_name == 'workflow_call' && inputs.build-path) || format('{0}-build', github.event.repository.name) }}
      CODEQL_EXTRACTOR_CPP_COMPILATION_DATABASE: ${{ github.workspace }}/${{ (github.event_name == 'workflow_call' && inputs.build-path) || format('{0}-build', github.event.repository.name) }}/compile_commands.json
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJson((github.event_name == 'workflow_call' && inputs.language-matrix) || '["cpp", "python", "actions"]') }}
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          path: ${{ env.local_checkout_path }}
          fetch-depth: 0

      - name: Setup build environment
        uses: Framework-R-D/phlex/.github/actions/setup-build-env@main
        with:
          build-path: ${{ env.local_build_path }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@cf1bb45a277cb3c205638b2cd5c984db1c46a412 # v4.31.7
        with:
          languages: ${{ matrix.language }}
          config-file: ${{ env.local_checkout_path }}/.github/codeql/codeql-config.yml
          source-root: ${{ env.local_checkout_path }}
          build-mode: none

      - name: Produce compile_commands.json (C++ only)
        if: matrix.language == 'cpp'
        uses: Framework-R-D/phlex/.github/actions/configure-cmake@main
        with:
          build-type: ${{ env.BUILD_TYPE }}
          source-path: ${{ env.local_checkout_path }}
          build-path: ${{ env.local_build_path }}

      - name: Verify compile_commands.json (C++ only)
        if: matrix.language == 'cpp'
        run: |
          set -euo pipefail
          if [ ! -f "$CODEQL_EXTRACTOR_CPP_COMPILATION_DATABASE" ]; then
            echo "Expected compile_commands.json at $CODEQL_EXTRACTOR_CPP_COMPILATION_DATABASE" >&2
            exit 1
          fi

      # Run CodeQL analysis (uploads results to code scanning)
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@cf1bb45a277cb3c205638b2cd5c984db1c46a412 # v4.31.7
        with:
          checkout_path: ${{ env.local_checkout_path }}
          output: results
          category: ${{ matrix.language }}

      - name: Upload SARIF results
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: results
          retention-days: 7

  codeql-report:
    name: Aggregate CodeQL alerts
    needs: codeql
    runs-on: ubuntu-24.04
    if: needs.codeql.result == 'success'
    permissions:
      contents: read
      issues: write
      pull-requests: write
      security-events: read
    env:
      CODEQL_MIN_LEVEL: warning
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Set log file path
        id: set_log_path
        run: echo "path=$RUNNER_TEMP/codeql-alerts.log" >> "$GITHUB_OUTPUT"
      - name: Checkout repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Download CodeQL SARIF artifacts
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: codeql-sarif-*
          path: sarif
          merge-multiple: true

      - name: Check CodeQL SARIF for new or resolved alerts
        id: check_codeql
        run: |
          set -euo pipefail
          ARGS=(
            --sarif "$GITHUB_WORKSPACE/sarif"
            --min-level "${CODEQL_MIN_LEVEL}"
            --log-path "${{ steps.set_log_path.outputs.path }}"
          )
          PR_NUMBER=""
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_NUMBER="${{ github.event.pull_request.number }}"
          elif [ "${{ github.event_name }}" = "workflow_call" ]; then
            PR_NUMBER="${{ inputs.pr-number }}"
          fi

          if [ -n "$PR_NUMBER" ]; then
            ARGS+=(--ref "refs/pull/${PR_NUMBER}/merge")
          fi
          python3 scripts/check_codeql_alerts.py "${ARGS[@]}"

      - name: Upload CodeQL alerts debug log
        if: always()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: codeql-alerts-debug-log
          path: ${{ steps.set_log_path.outputs.path }}
          retention-days: 3

      - name: "Debug: PR head and repo info (no-op for non-PR runs)"
        if: github.event_name == 'pull_request'
        run: |
          echo "github.repository: ${{ github.repository }}"
          echo "pr.head.repo.full_name: ${{ github.event.pull_request.head.repo.full_name }}"
          echo "pr.head.repo.owner.login: ${{ github.event.pull_request.head.repo.owner.login }}"
          echo "pr.base.repo.full_name: ${{ github.event.pull_request.base.repo.full_name }}"
          echo "actor: ${{ github.actor }}"
          echo "Available step outputs from check_codeql:"
          echo "  new_alerts=${{ steps.check_codeql.outputs.new_alerts }}"
          echo "  fixed_alerts=${{ steps.check_codeql.outputs.fixed_alerts }}"
          echo "Event payload head/type (first 200 chars):"
          if [ -n "$GITHUB_EVENT_PATH" ]; then
            jq -c . < "$GITHUB_EVENT_PATH" | cut -c-200 || true
          fi

      - name: Comment on PR with CodeQL alert changes
        if: >-
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          ) ||
          (
            github.event_name == 'workflow_call' && inputs.pr-number != '' &&
            inputs.pr-head-repo == inputs.pr-base-repo
          ) &&
          (steps.check_codeql.outputs.new_alerts == 'true' ||
           steps.check_codeql.outputs.fixed_alerts == 'true')
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- codeql-alerts -->';
            const legacyMarker = '<!-- codeql-new-alerts -->';
            const commentPath = '${{ steps.check_codeql.outputs.comment_path }}';

            if (!commentPath) {
              core.setFailed('check_codeql did not emit a comment_path output.');
              return;
            }

            const isWorkflowCall = context.eventName === 'workflow_call';
            const issueNumber = isWorkflowCall ? Number('${{ inputs.pr-number }}') : context.issue.number;
            const baseRepo = isWorkflowCall ? '${{ inputs.pr-base-repo }}' : context.repo.repo;
            const [owner, repo] = baseRepo.split('/');

            const body = fs.readFileSync(commentPath, 'utf8');
            const finalBody = body.includes(marker) ? body : `${body}\n${marker}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: owner,
              repo: repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find(comment => comment.body.includes(marker) || comment.body.includes(legacyMarker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: owner,
                repo: repo,
                comment_id: existing.id,
                body: finalBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: owner,
                repo: repo,
                issue_number: issueNumber,
                body: finalBody,
              });
            }

      - name: Log CodeQL alert changes for forked PR
        if: >-
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name != github.repository
          ) ||
          (
            github.event_name == 'workflow_call' && inputs.pr-number != '' &&
            inputs.pr-head-repo != inputs.pr-base-repo
          ) &&
          (steps.check_codeql.outputs.new_alerts == 'true' ||
           steps.check_codeql.outputs.fixed_alerts == 'true')
        run: |
          set -euo pipefail
          comment_file="${{ steps.check_codeql.outputs.comment_path }}"
          if [ "${{ steps.check_codeql.outputs.new_alerts }}" = "true" ]; then
            prefix="::error::"
            should_fail=true
          else
            prefix="::notice::"
            should_fail=false
          fi
          echo "${prefix}This PR is from a fork. CodeQL comments cannot be posted directly."
          echo "${prefix}Displaying comment content in the log:"
          while IFS= read -r line; do
            echo "${prefix}${line}"
          done < "$comment_file"
          if [ "$should_fail" = true ]; then
            exit 1
          fi

      - name: Fail workflow due to new CodeQL alerts
        if: >-
          (
            github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository
          ) ||
          (
            github.event_name == 'workflow_call' && inputs.pr-number != '' &&
            inputs.pr-head-repo == inputs.pr-base-repo
          ) &&
          steps.check_codeql.outputs.new_alerts == 'true'
        run: |
          echo "New CodeQL alerts detected; failing job."
          exit 1
